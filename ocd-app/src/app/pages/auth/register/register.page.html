<ion-content [fullscreen]="true" [dir]="lang.dir">
  <div class="flex flex-col items-center justify-center min-h-screen px-6">

    <!-- Language Dropdown -->
    <div class="flex justify-end w-full max-w-sm mb-4">
      <ion-select
        [value]="lang.current"
        (ionChange)="setLang($event.detail.value)"
        interface="popover"
        style="border: 1.5px solid #D1D5DB; border-radius: 10px; padding: 4px 10px; font-size: 14px; color: #374151;">
        <ion-select-option value="en">🇬🇧 English</ion-select-option>
        <ion-select-option value="ar">🇸🇦 العربية</ion-select-option>
        <ion-select-option value="fr">🇫🇷 Français</ion-select-option>
        <ion-select-option value="es">🇪🇸 Español</ion-select-option>
      </ion-select>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-800">{{ lang.t('registerTitle') }}</h1>
      <p class="text-sm mt-1" style="color: #8A8A8A">{{ lang.t('registerSubtitle') }}</p>
    </div>

    <div class="w-full max-w-sm">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ lang.t('email') }}</label>
        <ion-input type="email" [(ngModel)]="email" placeholder="example@email.com" fill="outline" dir="ltr"></ion-input>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ lang.t('password') }}</label>
        <ion-input type="password" [(ngModel)]="password" placeholder="••••••" fill="outline" dir="ltr"></ion-input>
      </div>

      <ion-button expand="block" [disabled]="loading" (click)="register()" color="primary">
        <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
        <span *ngIf="!loading">{{ lang.t('registerBtn') }}</span>
      </ion-button>

      <div class="text-center mt-4">
        <span class="text-sm" style="color: #8A8A8A">{{ lang.t('alreadyHaveAccount') }} </span>
        <a routerLink="/login" class="text-sm font-medium" style="color: #4F7CAC">{{ lang.t('loginLink') }}</a>
      </div>
    </div>

    <div class="mt-8 px-4 py-3 rounded-xl max-w-sm w-full" style="background: #EFF6FF">
      <p class="text-xs text-center leading-relaxed" style="color: #6B7280">
        {{ lang.t('disclaimerRegister') }}
      </p>
    </div>

  </div>
</ion-content>
